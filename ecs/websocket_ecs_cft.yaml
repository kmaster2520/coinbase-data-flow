AWSTemplateFormatVersion: '2010-09-09'
Description: >
  ECS over EC2 for the Coinbase WebSocket consumer (replaces websocket_instance_cft.yaml).
  The container runs websocket_script_coinbase_v2.py and pushes trades to Kinesis.
  The ECS service keeps exactly one task running and restarts it on failure.

  Prerequisites:
    1. Build and push the Docker image before deploying this stack:
         docker build -f ecs/Dockerfile -t coinbase-websocket .
         docker tag coinbase-websocket <EcrRepositoryUri>:latest
         docker push <EcrRepositoryUri>:latest
       EcrRepositoryUri is output by this stack on first deploy (bootstrap with a placeholder image URI).
    2. The VPC must have outbound access to wss://advanced-trade-ws.coinbase.com:443
       and to the Kinesis/ECR/CloudWatch VPC endpoints (or a NAT gateway).

Parameters:

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet for the ECS container instance

  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: >
      Security group for the ECS container instance.
      Requires outbound HTTPS (443) to Coinbase, Kinesis, ECR, and CloudWatch Logs.

  EcrImageUri:
    Type: String
    Description: >
      Full ECR image URI including tag, e.g.
      391262527903.dkr.ecr.us-east-1.amazonaws.com/coinbase-websocket:latest

  CoinbaseProductId:
    Type: String
    Default: BTC-USD
    AllowedValues:
      - BTC-USD
      - ETH-USD
      - LTC-USD
    Description: Coinbase product ID passed as argv[1] to the websocket script

  InstanceType:
    Type: String
    Default: t4g.nano
    AllowedValues:
      - t3.nano
      - t3.micro
      - t4g.nano
      - t4g.micro
    Description: >
      EC2 instance type for the ECS container instance.
      For Graviton (t4g.*) also update EcsAmiId to the arm64 SSM path.

  EcsAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ecs/optimized-ami/amazon-linux-2023/arm64/recommended/image_id
    Description: >
      ECS-optimized AMI resolved from SSM (using Graviton)

Resources:

  # ------------------------------------------------------------------ IAM ---

  # Task role: grants the running container access to Kinesis.
  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: btc-websocket-ecs-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: btc-websocket-ecs-task-role-kinesis
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: AllowWriteToKinesisStream
                Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                Resource: arn:aws:kinesis:us-east-1:391262527903:stream/raw-trade-data

  # Execution role: allows ECS agent to pull the image and write logs.
  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: btc-websocket-ecs-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # Instance role: allows the EC2 host to register with ECS and use SSM.
  Ec2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: btc-websocket-ecs-instance-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: btc-websocket-ecs-instance-profile
      Roles:
        - !Ref Ec2InstanceRole

  # ------------------------------------------------------------------ ECR ---

  EcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: coinbase-websocket
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last 5 images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 5
              },
              "action": { "type": "expire" }
            }]
          }
      Tags:
        - Key: Application
          Value: CoinbaseDataFlow

  # ---------------------------------------------------------- ECS Cluster ---

  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: coinbase-websocket-cluster
      Tags:
        - Key: Application
          Value: CoinbaseDataFlow

  # ----------------------------------------------------- CloudWatch Logs ---

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/coinbase-websocket
      RetentionInDays: 14

  # ------------------------------------------------- EC2 Container Instance ---

  # Launch template: writes ECS_CLUSTER into ecs.config so the agent joins
  # the correct cluster on boot.
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: coinbase-websocket-ecs-lt
      LaunchTemplateData:
        ImageId: !Ref EcsAmiId
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Arn: !GetAtt Ec2InstanceProfile.Arn
        SecurityGroupIds:
          - !Ref SecurityGroupId
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            echo ECS_CLUSTER=${EcsCluster} >> /etc/ecs/ecs.config
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: coinbase-websocket-ecs-instance
              - Key: Application
                Value: CoinbaseDataFlow

  # Fixed-size ASG: always exactly one container instance.
  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: coinbase-websocket-ecs-asg
      MinSize: '0'
      MaxSize: '1'
      DesiredCapacity: '1'
      VPCZoneIdentifier:
        - !Ref SubnetId
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Application
          Value: CoinbaseDataFlow
          PropagateAtLaunch: true

  # ----------------------------------------------- ECS Task & Service ---

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: coinbase-websocket
      NetworkMode: bridge
      RequiresCompatibilities:
        - EC2
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: websocket-consumer
          Image: !Ref EcrImageUri
          # argv[1] to websocket_script_coinbase_v2.py
          Command:
            - !Ref CoinbaseProductId
          # t3.nano has 512 MB; keep footprint small.
          Memory: 256
          MemoryReservation: 128
          Essential: true
          Environment:
            - Name: AWS_REGION
              Value: !Ref AWS::Region
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: websocket

  # DesiredCount: 1 + MinimumHealthyPercent: 0 means ECS will stop the old
  # task before starting a replacement — safe on a single small instance.
  # ECS restarts the task automatically on exit (equivalent to Restart=always).
  EcsService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: coinbase-websocket-service
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      LaunchType: EC2
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 100
      Tags:
        - Key: Application
          Value: CoinbaseDataFlow

Outputs:

  EcrRepositoryUri:
    Description: Push your Docker image here before running the service
    Value: !GetAtt EcrRepository.RepositoryUri

  ClusterName:
    Description: ECS cluster name
    Value: !Ref EcsCluster

  ServiceArn:
    Description: ECS service ARN
    Value: !Ref EcsService

  TaskDefinitionArn:
    Description: Task definition ARN
    Value: !Ref TaskDefinition

  LogGroupName:
    Description: CloudWatch log group for container stdout/stderr
    Value: !Ref LogGroup
